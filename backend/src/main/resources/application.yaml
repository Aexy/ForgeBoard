spring:
  application:
    name: forgeboard
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/forgeboard}
    username: ${DB_USER:forgeboard}
    password: ${DB_PASSWORD:forgeboard-local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway.enabled: true
management:
  endpoints.web.exposure.include: health,info
  endpoint.health.probes.enabled: true
server:
  port: ${APP_PORT:8080}
  shutdown: graceful
forgeboard:
  api-token:
    # A development-only fallback. Production must set FORGEBOARD_API_TOKEN_SECRET to a random base64 key.
    secret: ${FORGEBOARD_API_TOKEN_SECRET:Zm9yZ2Vib2FyZC1kZXZlbG9wbWVudC1hcGktdG9rZW4tc2lnbmluZy1rZXktcmVwbGFjZS1pbi1wcm9kdWN0aW9u}

