spring:
  application:
    name: forgeboard
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/forgeboard}
    username: ${DB_USER:forgeboard}
    password: ${DB_PASSWORD:forgeboard-local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway.enabled: true
management:
  endpoints.web.exposure.include: health,info
  endpoint.health.probes.enabled: true
server:
  port: ${APP_PORT:8080}
  shutdown: graceful

