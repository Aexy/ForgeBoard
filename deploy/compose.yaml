services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgeboard}
      POSTGRES_USER: ${POSTGRES_USER:-forgeboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgeboard-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - forgeboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgeboard} -d ${POSTGRES_DB:-forgeboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  forgeboard-postgres:

