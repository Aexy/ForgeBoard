name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Backend tests
        run: |
          FORGEBOARD_API_TOKEN_SECRET="$(openssl rand -base64 32)" mvn --batch-mode --file backend/pom.xml verify
      - run: pnpm install --frozen-lockfile
      - name: Next frontend test, typecheck, and build
        run: pnpm web:test && pnpm web:check && pnpm web:build
      - name: Build Next preview deployment image
        run: |
          docker build --file apps/web/Dockerfile --tag forgeboard-next:ci .
